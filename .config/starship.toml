format = """
$username\
$directory\
$git_branch\
$git_status\
$fill\
$lua\
$python\
$nodejs\
$aws\
$docker_context\
$jobs\
$conda\
$cmd_duration\
$custom\
$time\
$line_break\
$character\
"""

palette = "catppuccin_mocha"

# Don't print a new line at the start of the prompt
add_newline = false

[fill]
style = "bold lavender"
symbol = ' '

[time]
disabled = false
style = "bg:surface1 fg:lavender"
time_format = "%R"
format = '[$time](bold $style)[Ņé┤](surface1)'

[custom.live-clock-icon]
command = 'echo "ŅÄüŅÄéŅÄāŅÄäŅÄģŅÄåŅÄćŅÄłŅÄēŅÄŖŅÄŗŅÄī’ĆŚ" | cut -c $(($(date +%H)%12+1))'
when = true
style = "bg:surface1 fg:lavender"
format = "[ŅéČ](surface1)[$output ]($style)"

[username]
show_always = true
style_user = "bg:surface1 fg:yellow"
format = '[ŅéČ](surface1)[$user ](bold $style)'
disabled = false

[character]
success_symbol = '[’üĪ](bold green) '
error_symbol = '[’ĆŹ ’üĪ](bold red) '

[directory]
style = "bg:surface0 fg:lavender"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = 'ŌĆ”/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░łÖ'
'Downloads' = '’ĆÖ '
'Music' = '’Ćü '
'Pictures' = '’ĆŠ '

[git_branch]
style = "bg:base fg:lavender"
symbol = '’Éś '
format = '[on]($style)[ $symbol$branch]($style)'

[git_status]
style="bold lavender"
format = '(:[$all_status$ahead_behind]($style)) '
conflicted = '\[’Ā╣ [$count](bright-white bold)\]'
ahead = '\[[’»ü ](bright-blue)[$count](bright-white bold)\]'
behind = '\[[’«Š ](white)[$count](bright-white bold)\]'
diverged = '\[[Ņ£© ](purple)|[ ’»ü ](bright-blue)[$ahead_count](bright-white bold)[ ’«Š ](white)[$behind_count](bright-white)\]'
untracked = '\[’ä© [$count](bright-white bold)\]'
stashed = '\[[’Ż¢](yellow) [$count](bright-white bold)\]'
modified = '\[[Ņ½× ](bright-yellow)[$count](bright-white bold)\]'
staged = '\[[’æŚ ](bright-green)[$count](bright-white bold)\]'
renamed = '\[[’æÜ ](bright-cyan) [$count](bright-white bold)\]'
deleted = '\[’Ćö [$count](bright-white bold)\]'

[cmd_duration]
min_time = 1
format = '[$duration]($style) '

[jobs]
symbol = '’Ćō '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[aws]
symbol = '’ē░ '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = '’īł '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[python]
style = 'blue'
symbol = 'ŅłĄ '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ""

[conda]
style = "bg:blue"
format = '[[ $symbol( $environment) ](fg:#surface0 bg:blue)]($style)'
symbol = "Ņśå"
ignore_base	= false

[golang]
style = 'blue'
symbol = 'Ņś¦ '

[haskell]
style = 'blue'
symbol = 'ŅØĘ '

[nodejs]
style = 'blue'
symbol = 'Ņ£ś '

[rust]
style = 'orange'
symbol = 'Ņ×© '

[ruby]
style = 'blue'
symbol = 'Ņ×æ '

[lua]
symbol = 'ŅśĀ '

[package]
symbol = '¾░ÅŚ '


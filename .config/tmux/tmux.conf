##### Load Reset/Defaults #####
source-file ~/.config/tmux/tmux.reset.conf

##### Terminal + Mouse #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g set-clipboard on

##### Core Behavior #####
set -g prefix C-a
set -g escape-time 0
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format "#{?#{b:pane_current_command},#{b:pane_current_command},Window}"

##### Status Line #####
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=terminal"

##### Color Variables (from my scheme - nvim) #####
set -g @color-bg         '#0E1116'  # Crust
set -g @color-bg-alt     '#131925'  # Mantle
set -g @color-surface    '#1C2533'  # Surface0
set -g @color-muted      '#2E3A49'  # Overlay0
set -g @color-muted-alt  '#5B6675'  # Overlay2

set -g @color-fg         '#A8B0C0'  # Primary text
set -g @color-fg-light   '#C9D1DA'  # Lighter text
set -g @color-fg-bright  '#E5E9F0'  # Brightest text

set -g @color-red        '#D87C7C'  # base08
set -g @color-orange     '#D29B6C'  # base09
set -g @color-yellow     '#E8C275'  # base0A
set -g @color-green      '#6EC9B0'  # base0B
set -g @color-teal       '#75C6E0'  # base0C
set -g @color-blue       '#5A99D6'  # base0D
set -g @color-purple     '#9984D4'  # base0E
set -g @color-pink       '#D48CAF'  # base0F

##### Status Left #####
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@color-fg-bright},fg=#{@color-bg},bold] ⮞ #S },#{#[bg=default,fg=#{@color-teal}] ⮞ #S }}"

##### Status Right #####
set -g status-right ""
set -ga status-right "#[fg=#{@color-teal}] #(whoami)"
set -ga status-right "#[fg=#{@color-teal}] %H:%M"
set -ga status-right "#[fg=#{@color-teal}] %d-%b-%y "

##### Window Titles #####
set -g window-status-format " #I: #W "
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "

set -g window-status-style "bg=none,fg=#{@color-muted}"
set -g window-status-current-style "bg=#{@color-blue},fg=#{@color-bg},bold"
set -g window-status-last-style "bg=none,fg=#{@color-blue}"
set -g window-status-activity-style "bg=#{@color-red},fg=none"
set -g window-status-bell-style "bg=#{@color-red},fg=none,bold"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

##### Session Manager Popup #####
 bind o display-popup -E -w 80% -h 60% -T ' Session Switcher ' '
  tmux list-sessions -F "#{session_name}|#{session_windows}|#{?session_attached,attached,detached}" |
  grep -v "^$(tmux display-message -p "#S")|" |
  awk -F"|" "{
    status = (\$3 == \"attached\") ? \"\" : \"\"
    printf \"%-20s %s %2s windows %s\\n\", \$1, status, \$2, \"\"
  }" |
  fzf --reverse \
      --prompt="-> " \
      --header="Ctrl-R: refresh | Ctrl-D: delete | Ctrl-N: new-session" \
      --header-first \
      --border=rounded \
      --color="header:italic" \
      --preview="tmux list-windows -t {1} -F \"  #{window_index}: #{window_name} #{?window_active,(active),}\"" \
      --preview-window="right:40%:wrap" \
      --bind="ctrl-r:reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-d:execute(tmux kill-session -t {1})+reload(tmux list-sessions -F \"#{session_name}|#{session_windows}|#{?session_attached,attached,detached}\" | grep -v \"^\$(tmux display-message -p \"#S\")|\" | awk -F\"|\" \"{status = (\\\$3 == \\\"attached\\\") ? \\\"\\\" : \\\"\\\"; printf \\\"%-20s %s %2s windows %s\\\\n\\\", \\\$1, status, \\\$2, \\\"\\\"}\")" \
      --bind="ctrl-n:execute(bash -c '\''echo -n -e \"== New tmux Session === \n Session Name ->  \" && read name && [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" 2>/dev/null && tmux switch-client -t \"\$name\"'\'')+abort" \
      --info=inline \
      --layout=reverse |
  awk "{print \$1}" |
  xargs -r tmux switch-client -t
'

run '~/.config/tmux/plugins/tpm/tpm'


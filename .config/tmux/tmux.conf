##### Load Reset/Defaults #####
source-file ~/.config/tmux/tmux.reset.conf

##### Terminal + Mouse #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g set-clipboard on

##### Core Behavior #####
set -g prefix C-a
set -g escape-time 0
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format "#{?#{b:pane_current_command},#{b:pane_current_command},Window}"
setw -g mode-keys vi

##### Status Line #####
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=terminal"

##### Color Variables (from my scheme - nvim) #####
set -g @color-bg         '#1a1f2b'  # base00 - Background
set -g @color-bg-alt     '#232834'  # base01 - Mantle
set -g @color-surface    '#2e3440'  # base02 - Surface0
set -g @color-muted      '#4b5568'  # base03 - Overlay0
set -g @color-muted-alt  '#7a889a'  # base04 - Overlay2

set -g @color-fg         '#c2c6d8'  # base05 - Primary text
set -g @color-fg-light   '#d6d9e5'  # base06 - Lighter text
set -g @color-fg-bright  '#eff1f5'  # base07 - Brightest text

set -g @color-red        '#D87C7C'  # base08
set -g @color-orange     '#deb974'  # base09
set -g @color-yellow     '#e4d67c'  # base0A
set -g @color-green      '#88d1a2'  # base0B
set -g @color-teal       '#96d5e5'  # base0C
set -g @color-blue       '#7ba7df'  # base0D
set -g @color-purple     '#c19cd2'  # base0E
set -g @color-pink       '#b47777'  # base0F

##### Status Left #####
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@color-fg-bright},fg=#{@color-bg},bold] ⮞ #S },#{#[bg=default,fg=#{@color-teal}] ⮞ #S }}"

##### Status Right #####
set -g status-right ""
# set -ga status-right "#[fg=#{@color-teal}] #(whoami)"
# set -ga status-right "#[fg=#{@color-teal}] %H:%M"
# set -ga status-right "#[fg=#{@color-teal}] %d-%b-%y "

##### Window Titles #####
set -g window-status-format " #I: #W "
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "

set -g window-status-style "bg=none,fg=#{@color-muted}"
set -g window-status-current-style "bg=#{@color-blue},fg=#{@color-bg},bold"
set -g window-status-last-style "bg=none,fg=#{@color-blue}"
set -g window-status-activity-style "bg=#{@color-red},fg=none"
set -g window-status-bell-style "bg=#{@color-red},fg=none,bold"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key -r -T prefix C-k resize-pane -U 5
bind-key -r -T prefix C-j resize-pane -D 5
bind-key -r -T prefix C-h resize-pane -L 5
bind-key -r -T prefix C-l resize-pane -R 5
bind-key -r -T prefix C-S-k resize-pane -U
bind-key -r -T prefix C-S-j resize-pane -D
bind-key -r -T prefix C-S-h resize-pane -L
bind-key -r -T prefix C-S-l resize-pane -R

bind g popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit" # prefix-g to open floating lazygit

# sesh recommendations
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

run '~/.config/tmux/plugins/tpm/tpm'

# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# Install plugins: Press prefix + I (capital i) to fetch the plugin.

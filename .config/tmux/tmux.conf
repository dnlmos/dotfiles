source-file ~/.config/tmux/tmux.reset.conf
# General statusline customisation
set -g status-style 'bg=terminal'
# color
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"

set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
setw -g mode-keys vi

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

set -g @sessionx-bind 'o'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'


# Theme - configure Catppuccin
### 🍵 Catppuccin Theme - Transparent Background
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

### ⬅️ Status Left
set -g status-left-length 100
set -g status-left ""

set -ga status-left "#{?client_prefix,#{#[bg=default,fg=#{@thm_red},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

### ➡️ Status Right
set -g status-right-length 100
set -g status-right ""

# Add username and then date/time
set -ga status-right "#[fg=#{@thm_blue}] 󰅐 %H:%M "
set -ga status-right "#[fg=#{@thm_green}] │ #(whoami) "

### 🧠 Global Tmux UI
set -g status-style "bg=none"
set -g status-justify "absolute-centre"

### 📏 Pane Borders (Transparent)
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "fg=#{@thm_overlay_0}"
# setw -g pane-border-style "fg=#{@thm_surface_-}"
setw -g pane-border-lines single

### 🪟 Window Titlebars (Transparent)
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_command}"

# Optional: fallback name if command is unavailable
set -g automatic-rename-format "#{?#{b:pane_current_command},#{b:pane_current_command},Window}"

# Show numbered tabs and auto-named commands in status bar
set -g window-status-format " #I: #W "
set -g window-status-current-format " #I: #W "
set -g window-status-style "bg=none,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=none,fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=none"
set -g window-status-bell-style "bg=#{@thm_red},fg=none,bold"
set -gF window-status-separator "#[bg=none,fg=#{@thm_overlay_0}]│"

# ✅ Selected window — only this gets a background
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

run '~/.config/tmux/plugins/tpm/tpm'

# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# Install plugins: Press prefix + I (capital i) to fetch the plugin.

[buildPlans.iosevka-output]
family = "Iosevka Output"
spacing = "term"
serifs = "sans"
noLigation = true

  [buildPlans.iosevka-output.variants]
  inherits = "ss18"

    [buildPlans.iosevka-output.variants.design]
    f = "flat-hook-serifless-crossbar-at-x-height"
    l = "serifed-semi-tailed"
    q = "straight-serifless"
    t = "flat-hook"
    lower-alpha = "crossing"
    zero = "slashed"
    four = "semi-open-serifless"
    seven = "bend-serifed"
    eight = "crossing-asymmetric"
    asterisk = "hex-low"
    number-sign = "upright"

  [buildPlans.iosevka-output.metricOverride]
  leading = 1080
  parenSize = 850

# Non-term spacing; ligatures galore (I use this in Org-mode)
[buildPlans.iosevka-output-reader]
family = "Iosevka Output Reader"
spacing = "normal"
serifs = "sans"

  [buildPlans.iosevka-output-reader.variants]
  inherits = "ss18"

    [buildPlans.iosevka-output-reader.variants.design]
    f = "flat-hook-serifless-crossbar-at-x-height"
    l = "serifed-semi-tailed"
    q = "straight-serifless"
    t = "flat-hook"
    lower-alpha = "crossing"
    zero = "slashed"
    four = "semi-open-serifless"
    seven = "bend-serifed"
    eight = "crossing-asymmetric"
    asterisk = "hex-low"
    number-sign = "upright"

  [buildPlans.iosevka-output-reader.metricOverride]
  leading = 1080
  parenSize = 850

# Quasi-proportional for reading text
[buildPlans.iosevka-output-prose]
family = "Iosevka Output Prose"
spacing = "quasi-proportional"
serifs = "sans"

  [buildPlans.iosevka-output-prose.variants]
  inherits = "ss18"

    [buildPlans.iosevka-output-prose.variants.design]
    f = "flat-hook-serifless-crossbar-at-x-height"
    l = "serifed-semi-tailed"
    q = "straight-serifless"
    t = "flat-hook"
    lower-alpha = "crossing"
    zero = "slashed"
    four = "semi-open-serifless"
    seven = "bend-serifed"
    eight = "crossing-asymmetric"
    asterisk = "hex-low"
    number-sign = "upright"

  [buildPlans.iosevka-output-prose.metricOverride]
  leading = 1080
  parenSize = 850

# Smaller font file: fewer characters and weights
[buildPlans.iosevka-output-minimal]
family = "Iosevka Output Minimal"
spacing = "term"
serifs = "sans"
noLigation = true

  [buildPlans.iosevka-output-minimal.variants]
  inherits = "ss18"

    [buildPlans.iosevka-output-minimal.variants.design]
    f = "flat-hook-serifless-crossbar-at-x-height"
    l = "serifed-semi-tailed"
    q = "straight-serifless"
    t = "flat-hook"
    lower-alpha = "crossing"
    zero = "slashed"
    four = "semi-open-serifless"
    seven = "bend-serifed"
    eight = "crossing-asymmetric"
    asterisk = "hex-low"
    number-sign = "upright"

  [buildPlans.iosevka-output-minimal.excludeChars]
  ranges = [[1024,230032]]
  
  [buildPlans.iosevka-output-minimal.metricOverride]
  leading = 1080
  parenSize = 850
  
  [buildPlans.iosevka-output-minimal.weights.ExtraLight]
  shape = 200
  menu = 200
  css = 200
  
  [buildPlans.iosevka-output-minimal.weights.Light]
  shape = 300
  menu = 300
  css = 300
  
  [buildPlans.iosevka-output-minimal.weights.Regular]
  shape = 400
  menu = 400
  css = 400
  
  [buildPlans.iosevka-output-minimal.weights.SemiBold]
  shape = 600
  menu = 600
  css = 600
  
  [buildPlans.iosevka-output-minimal.weights.ExtraBold]
  shape = 800
  menu = 800
  css = 800
  
  [buildPlans.iosevka-output-minimal.widths.Normal]
  shape = 600
  menu = 5
  css = "normal"
  
  [buildPlans.iosevka-output-minimal.slopes.Upright]
  angle = 0
  shape = "upright"
  menu = "upright"
  css = "normal"
  
  [buildPlans.iosevka-output-minimal.slopes.Italic]
  angle = 9.4
  shape = "italic"
  menu = "italic"
  css = "italic"
  
